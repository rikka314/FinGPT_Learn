<svg xmlns="http://www.w3.org/2000/svg" width="760" height="520" viewBox="0 0 760 520" role="img" aria-labelledby="title desc">
  <title id="title">FinGPT HF benchmark confusion matrix</title>
  <desc id="desc">Confusion matrix for 32 Financial PhraseBank samples. Rows are actual labels and columns are predicted labels.</desc>
  <rect width="760" height="520" fill="#ffffff"/>
  <text x="380" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#111827">FinGPT HF Benchmark Confusion Matrix</text>
  <text x="380" y="64" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#4b5563">Financial PhraseBank, seed=42 test split, first 32 samples</text>

  <text x="430" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">Predicted label</text>
  <text x="38" y="308" text-anchor="middle" transform="rotate(-90 38 308)" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#111827">Actual label</text>

  <g font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#111827">
    <text x="250" y="132" text-anchor="middle">negative</text>
    <text x="370" y="132" text-anchor="middle">neutral</text>
    <text x="490" y="132" text-anchor="middle">positive</text>
    <text x="610" y="132" text-anchor="middle">unparsed</text>
    <text x="118" y="195" text-anchor="end">negative</text>
    <text x="118" y="275" text-anchor="end">neutral</text>
    <text x="118" y="355" text-anchor="end">positive</text>
    <text x="118" y="435" text-anchor="end">unparsed</text>
  </g>

  <g stroke="#ffffff" stroke-width="2" font-family="Arial, sans-serif" font-size="22" font-weight="700">
    <rect x="130" y="150" width="120" height="80" fill="#f8fafc"/><text x="190" y="198" text-anchor="middle" fill="#111827">0</text>
    <rect x="250" y="150" width="120" height="80" fill="#93c5fd"/><text x="310" y="198" text-anchor="middle" fill="#111827">3</text>
    <rect x="370" y="150" width="120" height="80" fill="#f8fafc"/><text x="430" y="198" text-anchor="middle" fill="#111827">0</text>
    <rect x="490" y="150" width="120" height="80" fill="#dbeafe"/><text x="550" y="198" text-anchor="middle" fill="#111827">1</text>

    <rect x="130" y="230" width="120" height="80" fill="#60a5fa"/><text x="190" y="278" text-anchor="middle" fill="#111827">4</text>
    <rect x="250" y="230" width="120" height="80" fill="#1d4ed8"/><text x="310" y="278" text-anchor="middle" fill="#ffffff">6</text>
    <rect x="370" y="230" width="120" height="80" fill="#60a5fa"/><text x="430" y="278" text-anchor="middle" fill="#111827">4</text>
    <rect x="490" y="230" width="120" height="80" fill="#3b82f6"/><text x="550" y="278" text-anchor="middle" fill="#ffffff">5</text>

    <rect x="130" y="310" width="120" height="80" fill="#f8fafc"/><text x="190" y="358" text-anchor="middle" fill="#111827">0</text>
    <rect x="250" y="310" width="120" height="80" fill="#bfdbfe"/><text x="310" y="358" text-anchor="middle" fill="#111827">2</text>
    <rect x="370" y="310" width="120" height="80" fill="#bfdbfe"/><text x="430" y="358" text-anchor="middle" fill="#111827">2</text>
    <rect x="490" y="310" width="120" height="80" fill="#3b82f6"/><text x="550" y="358" text-anchor="middle" fill="#ffffff">5</text>

    <rect x="130" y="390" width="120" height="80" fill="#f8fafc"/><text x="190" y="438" text-anchor="middle" fill="#111827">0</text>
    <rect x="250" y="390" width="120" height="80" fill="#f8fafc"/><text x="310" y="438" text-anchor="middle" fill="#111827">0</text>
    <rect x="370" y="390" width="120" height="80" fill="#f8fafc"/><text x="430" y="438" text-anchor="middle" fill="#111827">0</text>
    <rect x="490" y="390" width="120" height="80" fill="#f8fafc"/><text x="550" y="438" text-anchor="middle" fill="#111827">0</text>
  </g>

  <g font-family="Arial, sans-serif" font-size="12" fill="#374151">
    <rect x="650" y="188" width="22" height="22" fill="#f8fafc" stroke="#e5e7eb"/>
    <text x="680" y="204">0</text>
    <rect x="650" y="225" width="22" height="22" fill="#bfdbfe"/>
    <text x="680" y="241">2</text>
    <rect x="650" y="262" width="22" height="22" fill="#60a5fa"/>
    <text x="680" y="278">4</text>
    <rect x="650" y="299" width="22" height="22" fill="#1d4ed8"/>
    <text x="680" y="315">6</text>
  </g>
</svg>
